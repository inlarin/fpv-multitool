<div id="tab-servo" class="tab-content" style="display:none">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Servo Tester</span>
      <span class="badge badge-neutral">GPIO 2</span>
    </div>

    <div class="big" id="servoUs">1500 μs</div>
    <input type="range" id="servoSlider" min="500" max="2500" value="1500" step="10" oninput="onServo()">

    <div class="grid">
      <button class="secondary" onclick="setServo(500)">Min · 500</button>
      <button class="secondary" onclick="setServo(1500)">Center</button>
      <button class="secondary" onclick="setServo(2500)">Max · 2500</button>
      <button class="danger" onclick="servoStop()">Stop</button>
    </div>

    <div class="kv">
      <span class="kv-label">Frequency</span>
      <div class="cluster">
        <button class="ghost btn-sm" onclick="setServoFreq(50)">50 Hz</button>
        <button class="ghost btn-sm" onclick="setServoFreq(330)">330 Hz</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Range calibration</span>
    </div>

    <div class="banner banner-info">
      Двигай ползунок, нажимай <b>Mark Min/Max</b> где сервомашинка упирается физически.
      Потом <b>Apply to Sweep</b> — и sweep будет ходить только в этих пределах.
    </div>

    <div class="grid">
      <button class="secondary" onclick="servoMark('Min')">Mark Min · <span id="servoMarkMinVal">--</span></button>
      <button class="secondary" onclick="servoMark('Max')">Mark Max · <span id="servoMarkMaxVal">--</span></button>
      <button onclick="servoApplyMarks()">Apply to Sweep</button>
      <button class="danger" onclick="servoResetMarks()">Reset</button>
    </div>

    <hr>

    <div class="field">
      <span class="field-label">Sweep range (μs)</span>
      <div class="cluster">
        <input id="sweepMinUs" type="number" min="500" max="2500" step="10" value="1000">
        <span class="kv-label">to</span>
        <input id="sweepMaxUs" type="number" min="500" max="2500" step="10" value="2000">
      </div>
    </div>

    <div class="field">
      <span class="field-label">Period (ms)</span>
      <div class="cluster">
        <input id="sweepPeriodMs" type="number" min="200" max="20000" step="100" value="2000">
        <button class="secondary" onclick="servoSweepCfgSave()">Apply</button>
      </div>
    </div>

    <div class="kv">
      <span class="kv-label">Sweep</span>
      <button onclick="toggleSweep()"><span id="sweepBtn">Start</span></button>
    </div>

    <div class="kv">
      <span class="kv-label">Observed range</span>
      <span class="kv-value mono" id="servoObserved">--</span>
    </div>
  </div>
</div>
