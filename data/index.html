<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FPV MultiTool</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><style>.p{transform-origin:center;transform-box:fill-box;animation:s .35s linear infinite}.cw{animation-direction:reverse}.ring{transform-origin:16px 16px;animation:r 2.4s ease-out infinite}@keyframes s{to{transform:rotate(360deg)}}@keyframes r{0%{r:6;opacity:.8}100%{r:15;opacity:0}}</style></defs><rect width='32' height='32' rx='6' fill='%230f0f1e'/><circle class='ring' cx='16' cy='16' r='6' fill='none' stroke='%230cf' stroke-width='.6'/><path d='M16 16 L7 7 M16 16 L25 7 M16 16 L7 25 M16 16 L25 25' stroke='%23444' stroke-width='1.4' stroke-linecap='round'/><ellipse class='p' cx='7' cy='7' rx='4' ry='1' fill='%230cf' opacity='.85'/><ellipse class='p cw' cx='25' cy='7' rx='4' ry='1' fill='%23f0c' opacity='.85'/><ellipse class='p cw' cx='7' cy='25' rx='4' ry='1' fill='%23f0c' opacity='.85'/><ellipse class='p' cx='25' cy='25' rx='4' ry='1' fill='%230cf' opacity='.85'/><circle cx='16' cy='16' r='2.2' fill='%230f0f1e' stroke='%230cf' stroke-width='.8'/></svg>">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="confirmBackdrop" class="modal-backdrop" onclick="if(event.target===this)_modalCancel()">
  <div class="modal-box" id="confirmBox" role="alertdialog" aria-modal="true" aria-labelledby="confirmMsg">
    <p class="modal-msg" id="confirmMsg"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="_modalCancel()">Cancel</button>
      <button class="modal-ok success" onclick="_modalOk()" id="confirmOkBtn">OK</button>
    </div>
  </div>
</div>
<div id="connStatus" class="disconnected">...</div>
<button id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark theme">🌙</button>
<h1>FPV MultiTool</h1>

<div class="ws-tabs" id="wsTabs">
  <div class="ws-tab active" onclick="showWorkspace('batt')">Battery Lab</div>
  <div class="ws-tab" onclick="showWorkspace('fpv')">FPV Tools</div>
  <div class="ws-tab" onclick="showWorkspace('sys')">System</div>
</div>

<div id="ws-batt">
  <div class="tabs">
    <div class="tab active" onclick="showTab('battery')">Battery</div>
  </div>
</div>
<div id="ws-fpv" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="showTab('servo')">Servo</div>
    <div class="tab" onclick="showTab('motor')">Motor</div>
    <div class="tab" onclick="showTab('receiver')">Receiver</div>
    <div class="tab" onclick="showTab('rcsniff')">RC Sniff</div>
  </div>
</div>
<div id="ws-sys" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="showTab('setup')">Setup</div>
    <div class="tab" onclick="showTab('sys')">System</div>
    <div class="tab" onclick="showTab('ota')">OTA</div>
  </div>
</div>

<!-- ===== SERVO ===== -->
<!-- {{TABS}} -->

<script src="/ui.js"></script>
<div id="fwFooter" style="text-align:center;color:#444;font-size:11px;margin:20px 0 8px;font-family:monospace"></div>
</body>
</html>
