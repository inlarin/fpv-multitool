name: Release

# Triggered by pushing a v* tag. Builds both production envs, attaches
# the resulting binaries to a GitHub Release as `firmware-<env>.bin`,
# which is the asset name each device's /api/ota/check endpoint asks
# for at runtime (see GITHUB_OTA_ASSET in platformio.ini).
#
# Manual run via "workflow_dispatch" rebuilds the latest tagged release
# without needing to retag -- useful if a CI artefact ever needs replacing.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build the release for'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32s3
          - wt32_sc01_plus

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          # PIO's inject_version.py runs `git describe --tags --exact-match`
          # so we need the tag itself, not just the commit. Default checkout
          # depth is 1; that's fine because we always check out the tag ref.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware (${{ matrix.env }})
        run: pio run -e ${{ matrix.env }}

      - name: Stage release asset
        run: |
          mkdir -p release-bins
          cp .pio/build/${{ matrix.env }}/firmware.bin \
             release-bins/firmware-${{ matrix.env }}.bin

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: release-bins/firmware-${{ matrix.env }}.bin
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create / update the Release
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for changelog

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: artefacts

      - name: Flatten asset paths
        run: |
          mkdir -p assets
          find artefacts -name 'firmware-*.bin' -exec cp {} assets/ \;
          ls -la assets/

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: assets/firmware-*.bin
