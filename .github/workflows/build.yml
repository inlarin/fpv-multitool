name: Build firmware

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Derive version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          else
            VER="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VER}"

      - name: Build
        env:
          PLATFORMIO_BUILD_FLAGS: -DFW_VERSION=\"${{ steps.ver.outputs.version }}\"
        run: pio run -e esp32s3

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp .pio/build/esp32s3/firmware.bin "dist/firmware-${{ steps.ver.outputs.version }}.bin"
          cp .pio/build/esp32s3/firmware.bin dist/firmware.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.ver.outputs.version }}
          path: dist/*.bin
          retention-days: 30

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/firmware-${{ steps.ver.outputs.version }}.bin
            dist/firmware.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
