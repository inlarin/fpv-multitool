; PlatformIO config for ESP32-S3-LCD-1.47B (FPV MultiTool)
; Board: Waveshare ESP32-S3-LCD-1.47B / diymore clone

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash & PSRAM ---
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; --- USB: native USB on ESP32-S3 ---
; ARDUINO_USB_MODE=0 → TinyUSB stack (supports composite CDC + HID + Vendor)
; ARDUINO_USB_CDC_ON_BOOT=1 keeps USB serial for flashing/debug
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -DCFG_TUD_HID=1
    -DCFG_TUD_VENDOR=1
    -DCFG_TUD_CDC=1
    -DCFG_TUD_ENDPOINT0_SIZE=64
    -DGITHUB_REPO=\"inlarin/fpv-multitool\"
    -Wall
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-format

; FW_VERSION is injected by CI from the git tag; local builds get "dev".
build_unflags =
extra_scripts =
    pre:scripts/inject_version.py
    pre:scripts/gzip_web_ui.py

; --- Upload via USB ---
upload_speed = 921600
monitor_speed = 115200

; --- Libraries (pinned to known-working versions) ---
lib_deps =
    moononournation/GFX Library for Arduino@1.5.6
    esp32async/ESPAsyncWebServer@3.8.0
    esp32async/AsyncTCP@3.4.10
    bblanchon/ArduinoJson@7.2.0
    ricmoo/QRCode@0.0.1
