; PlatformIO config for ESP32-S3-LCD-1.47B (FPV MultiTool)
; Board: Waveshare ESP32-S3-LCD-1.47B / diymore clone

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash & PSRAM ---
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; --- USB: native USB on ESP32-S3 ---
; ARDUINO_USB_MODE=0 → TinyUSB stack (supports composite CDC + HID + Vendor)
; ARDUINO_USB_CDC_ON_BOOT=1 keeps USB serial for flashing/debug
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=0
    -DCFG_TUD_HID=1
    -DCFG_TUD_VENDOR=1
    -DCFG_TUD_CDC=1
    -DCFG_TUD_ENDPOINT0_SIZE=64
    -DGITHUB_REPO=\"inlarin/fpv-multitool\"
    ; RESEARCH_MODE enables ~22 SMBus clone-research endpoints in
    ; routes_battery.cpp (/api/batt/clone/*). Comment out to strip them
    ; from production builds (~40 KB lighter, removes WiFi-creds leak
    ; surface from clone DF dumps).
    -DRESEARCH_MODE
    -Wall
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-format

; FW_VERSION is injected by CI from the git tag; local builds get "dev".
build_unflags =
extra_scripts =
    pre:scripts/inject_version.py
    pre:scripts/lint_ui.py
    pre:scripts/gzip_web_ui.py

; SC01-Plus-specific source files live under src/board/wt32_sc01_plus/ and
; depend on LovyanGFX/LVGL (not pulled into this Waveshare env). Exclude
; them so the default `+<*>` filter doesn't try to compile them here.
build_src_filter = +<*> -<board/wt32_sc01_plus/>

; --- Upload via USB ---
upload_speed = 921600
monitor_speed = 115200

; --- Libraries (pinned to known-working versions) ---
lib_deps =
    moononournation/GFX Library for Arduino@1.5.6
    esp32async/ESPAsyncWebServer@3.8.0
    esp32async/AsyncTCP@3.4.10
    bblanchon/ArduinoJson@7.2.0
    ricmoo/QRCode@0.0.1


; ============================================================================
; Sprint 32 — Wireless-Tag WT32-SC01 Plus bring-up sanity sketch
; ============================================================================
; Standalone env that builds ONLY src/board/wt32_sc01_plus/sanity.cpp.
; Goal: confirm toolchain + QSPI PSRAM init + native USB CDC + I2C scan
; before bolting on LCD / touch / SD drivers. Does not pull in the main
; project's web stack at all.
;
; CRITICAL DIFFERENCES from [env:esp32s3]:
;   - psram_type = QSPI  (this board has R2/QSPI, not the Waveshare's R8/OPI)
;   - ARDUINO_USB_MODE = 1  (standard CDC, not TinyUSB — esptool DTR/RTS works)
;   - ARDUINO_USB_CDC_ON_BOOT = 1  (Serial.print routes to USB)
;
; SAFETY: always pass --upload-port COM13 explicitly. Pio auto-detect can
; pick the wrong board (both expose 303A:1001). MAC of this board's chip
; must be 88:56:A6:80:EB:48 — verify via reference_board_macs.md snippet.
[env:wt32_sc01_plus_sanity]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -Wall

build_src_filter = +<board/wt32_sc01_plus/sanity.cpp>

upload_speed = 921600
monitor_speed = 115200

; No web stack, no GFX, no QRCode — sanity is bare Arduino + Wire.
lib_deps =


; ============================================================================
; Sprint 32 step 2 — WT32-SC01 Plus LCD bring-up (LovyanGFX)
; ============================================================================
; Builds ONLY src/board/wt32_sc01_plus/lcd_sanity.cpp. Drives the ST7796
; 320x480 panel over the 8-bit 8080 parallel bus via LovyanGFX (which
; wraps ESP-IDF 5 esp_lcd_panel_io_i80 with DMA).
;
; Why LovyanGFX (not Arduino_GFX): in pinned Arduino_GFX 1.5.6 the
; Arduino_ESP32LCD8 class is gated #if ESP_ARDUINO_VERSION_MAJOR < 3 —
; literally does not compile on this project's Arduino Core 3. LovyanGFX
; supports Core 3 + IDF 5 i80 driver out of the box and is the canonical
; SC01 Plus stack (openHASP, Smartdisplay).
;
; SAFETY: always pass --upload-port COM13 explicitly. Pio auto-detect can
; pick the wrong board (both expose 303A:1001). MAC of this board's chip
; must be 88:56:A6:80:EB:48 — verify before flashing.
[env:wt32_sc01_plus_lcd]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -Wall

build_src_filter = +<board/wt32_sc01_plus/lcd_sanity.cpp>

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0


; ============================================================================
; Sprint 32 step 2b — WT32-SC01 Plus LVGL + FT6336 touch sanity
; ============================================================================
; Builds the rotation-aware display facade (BoardDisplay) on top of the
; step-2 LovyanGFX driver, plus LVGL v9 for widgets and the FT6336 touch
; driver. The demo lets the user flip rotation 0..3 from on-screen buttons,
; persisting the choice to NVS so the board comes up at the last-saved
; orientation -- proves the user-configurable-rotation path end to end.
;
; lv_conf.h lives in include/ and is reached via -DLV_CONF_INCLUDE_SIMPLE.
; LVGL v9 dropped LV_TICK_CUSTOM in favor of lv_tick_set_cb(); we wire
; that to millis() in setup().
;
; SAFETY: same as step 2 -- always upload to COM13 explicitly. MAC of
; this board's chip must be 88:56:A6:80:EB:48.
[env:wt32_sc01_plus_lvgl]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -Wall

build_src_filter =
    +<board/wt32_sc01_plus/board_settings.cpp>
    +<board/wt32_sc01_plus/board_display.cpp>
    +<board/wt32_sc01_plus/lvgl_sanity.cpp>

; Pre-build patch: strip LovyanGFX's bundled lv_font/ subsystem so its
; LV_COLOR_FORMAT_* enums don't collide with real LVGL. See script header.
extra_scripts = pre:scripts/patch_lovyangfx_lvgl_conflict.py

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@9.2.2


; ============================================================================
; Sprint 32 step 2c — WT32-SC01 Plus SDMMC sanity
; ============================================================================
; Builds ONLY src/board/wt32_sc01_plus/sdmmc_sanity.cpp. Mounts the
; onboard microSD slot in 1-bit SDMMC mode (D1/D2 not exposed on this
; PCB, factory app uses 1-bit too) and exercises read/write so we know
; the slot is good before relying on it for the catalog mirror.
;
; Pulls LovyanGFX for the on-screen status lines (no LVGL on this env).
;
; SAFETY: same as previous SC01 Plus envs -- always upload to COM13,
; verify MAC 88:56:A6:80:EB:48.
[env:wt32_sc01_plus_sdmmc]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -Wall

build_src_filter = +<board/wt32_sc01_plus/sdmmc_sanity.cpp>

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0


; ============================================================================
; Sprint 32 step 2d — WT32-SC01 Plus WiFi STA sanity
; ============================================================================
; Builds ONLY src/board/wt32_sc01_plus/wifi_sanity.cpp + board_settings.cpp
; (which gained wifi_ssid/wifi_pass NVS keys for this step). Connects in
; STA mode using credentials read from NVS; if NVS is empty on first
; boot, seeds with hardcoded defaults so we have something to connect
; to during bring-up. Serial CLI lets you change creds at runtime
; (`wifi set <ssid> <pass>` / `wifi show` / `wifi clear` / `help`).
;
; Pulls LovyanGFX for on-screen status (no LVGL on this env).
;
; SAFETY: same as previous SC01 Plus envs -- always upload to COM13,
; verify MAC 88:56:A6:80:EB:48.
[env:wt32_sc01_plus_wifi]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -Wall

build_src_filter =
    +<board/wt32_sc01_plus/board_settings.cpp>
    +<board/wt32_sc01_plus/wifi_sanity.cpp>

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0


; ============================================================================
; SC01 Plus — full app (Phase 0 skeleton)
; ============================================================================
; This is the eventual main env for the SC01 Plus board. It builds the
; same full feature set as [env:esp32s3] (web stack + servo + motor +
; battery + CRSF + sniffer + USB), plus the LVGL touchscreen UI on top.
;
; Excludes:
;   - src/main.cpp                    -> replaced by main_sc01_plus.cpp
;   - src/ui/menu.cpp / button.cpp / status_led.cpp  -> Waveshare local
;     menu UI (BTN_BOOT navigation + RGB LED), replaced by LVGL screens
;   - src/*/*_tester.cpp / *_ui.cpp   -> Waveshare local-LCD UI screens,
;     replaced by LVGL screens
;   - src/web/wifi_app.cpp / src/bridge/usb2ttl.cpp  -> Waveshare local UI
;   - src/board/wt32_sc01_plus/*_sanity.cpp  -> standalone bring-up sketches
;
; Pre-build patch: same as wt32_sc01_plus_lvgl env -- strip LovyanGFX's
; bundled lv_font/ subsystem so it doesn't collide with real LVGL.
[env:wt32_sc01_plus]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
; Stays on the stock arduino-esp32 default_16MB.csv (no factory partition)
; for OTA backward-compat with boards already deployed on this layout.
; For NEW deployments that want the safeboot recovery shell, use
; [env:wt32_sc01_plus_safe] instead -- it has the same source code but a
; different partition table, so the very first flash is USB-only.
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -Wall

build_src_filter =
    +<*>
    -<main.cpp>
    -<ui/menu.cpp>
    -<ui/button.cpp>
    -<ui/status_led.cpp>
    -<ui/display.cpp>
    -<crsf/crsf_tester.cpp>
    -<motor/motor_tester.cpp>
    -<servo/servo_tester.cpp>
    -<battery/battery_ui.cpp>
    -<battery/smbus_bridge_ui.cpp>
    -<bridge/usb2ttl.cpp>
    -<web/wifi_app.cpp>
    -<board/wt32_sc01_plus/sanity.cpp>
    -<board/wt32_sc01_plus/lcd_sanity.cpp>
    -<board/wt32_sc01_plus/lvgl_sanity.cpp>
    -<board/wt32_sc01_plus/sdmmc_sanity.cpp>
    -<board/wt32_sc01_plus/wifi_sanity.cpp>
    -<board/wt32_sc01_plus/safeboot.cpp>

extra_scripts = pre:scripts/patch_lovyangfx_lvgl_conflict.py

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@9.2.2
    esp32async/ESPAsyncWebServer@3.8.0
    esp32async/AsyncTCP@3.4.10
    bblanchon/ArduinoJson@7.2.0
    ricmoo/QRCode@0.0.1


; ============================================================================
; SC01 Plus -- safeboot recovery shell (factory partition firmware)
; ============================================================================
; This is the immutable recovery firmware that lives in the `factory`
; partition. The bootloader falls back to it if BOTH ota_0 and ota_1
; become INVALID (rollback ran out of valid images). The safeboot app
; offers WiFi + WebServer + /api/ota/upload + a status banner on the LCD.
; Tap-through UI / batteries / motors / LVGL etc are all stripped out --
; it's strictly a "I can be reflashed via the network" shell.
;
; Build target: factory partition is 1 MB. Current image fits in ~700 KB.
;
; Initial-flash sequence (one-time at deployment, USB only):
;   1. pio run -e wt32_sc01_plus_safeboot
;   2. pio run -e wt32_sc01_plus
;   3. esptool.py --port COM<N> write_flash \
;        0x0      .pio/build/wt32_sc01_plus/bootloader.bin \
;        0x8000   .pio/build/wt32_sc01_plus/partitions.bin \
;        0x10000  .pio/build/wt32_sc01_plus_safeboot/firmware.bin \
;        0x110000 .pio/build/wt32_sc01_plus/firmware.bin
;
; After deployment, only firmware.bin gets updated via /api/ota/upload.
; The factory partition is never touched in the field.
[env:wt32_sc01_plus_safeboot]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.partitions = partitions/sc01_plus_safeboot_16MB.csv
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_WT32_SC01_PLUS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DLGFX_USE_V1
    -Wall

build_src_filter =
    +<board/wt32_sc01_plus/safeboot.cpp>
    +<board/wt32_sc01_plus/board_settings.cpp>

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    esp32async/ESPAsyncWebServer@3.8.0
    esp32async/AsyncTCP@3.4.10


; ============================================================================
; SC01 Plus -- main app on safeboot-aware partition layout (NEW deployments)
; ============================================================================
; Same code as [env:wt32_sc01_plus] but with the partition table that
; reserves a 1 MB factory slot for the safeboot recovery firmware. Use
; THIS env (not wt32_sc01_plus) for boards being prepared for remote
; deployment, because the bootloader will then have a guaranteed
; recovery target if both ota_0 and ota_1 ever become INVALID.
;
; Switching from default_16MB.csv -> sc01_plus_safeboot_16MB.csv
; requires a one-time USB cold flash (partition table can't be updated
; over OTA). Once provisioned, ongoing updates use OTA against ota_0/1
; same as the standard env.
[env:wt32_sc01_plus_safe]
extends = env:wt32_sc01_plus
board_build.partitions = partitions/sc01_plus_safeboot_16MB.csv
